<!DOCTYPE html>
<html>
<head>
    <title>Login Debug Helper</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #00ff00;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #333;
            background: #0a0a0a;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            background: #00aa00;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #00ff00;
            color: black;
        }
        #output {
            white-space: pre-wrap;
            padding: 10px;
            background: #000;
            border: 1px solid #333;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>🔍 Login Debug Helper</h1>
    
    <div class="section">
        <h2>1. Test Login API</h2>
        <button onclick="testLogin()">Test Login</button>
        <button onclick="checkCookies()">Check Cookies</button>
        <button onclick="clearCookies()">Clear All Cookies</button>
    </div>

    <div class="section">
        <h2>Output:</h2>
        <div id="output"></div>
    </div>

    <script>
        const log = (msg) => {
            const output = document.getElementById('output');
            output.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
            output.scrollTop = output.scrollHeight;
        };

        async function testLogin() {
            log('🔄 Starting login test...');
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'jeffrey@laventecare.nl',
                        password: 'xX@&BfCqq3x&yC4jMG8m'
                    }),
                    credentials: 'include', // Important!
                });

                log(`📡 Response Status: ${response.status} ${response.statusText}`);
                
                // Check response headers
                log('📋 Response Headers:');
                response.headers.forEach((value, key) => {
                    log(`   ${key}: ${value.substring(0, 100)}`);
                });

                // Check body
                const data = await response.json();
                log('📦 Response Body:');
                log(JSON.stringify(data, null, 2));

                // Check if cookies were set
                setTimeout(() => {
                    log('\n🍪 Cookies after login:');
                    log(document.cookie || '(empty)');
                }, 100);

            } catch (error) {
                log(`❌ Error: ${error.message}`);
                console.error(error);
            }
        }

        function checkCookies() {
            log('🍪 Current cookies:');
            const cookies = document.cookie;
            if (!cookies) {
                log('   (no cookies set)');
            } else {
                cookies.split(';').forEach(c => {
                    log(`   ${c.trim()}`);
                });
            }
            
            log('\n🔍 Specific checks:');
            log(`   has access_token: ${cookies.includes('access_token')}`);
            log(`   has refresh_token: ${cookies.includes('refresh_token')}`);
        }

        function clearCookies() {
            log('🗑️ Clearing all cookies...');
            document.cookie.split(";").forEach(c => {
                document.cookie = c.trim().split("=")[0] + "=;expires=" + new Date(0).toUTCString() + ";path=/";
            });
            log('✅ Cookies cleared');
            setTimeout(checkCookies, 100);
        }

        // Auto-check cookies on load
        window.addEventListener('load', () => {
            log('🚀 Debug Helper Loaded');
            checkCookies();
        });
    </script>
</body>
</html>
