<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100" fill="none">
  <defs>
    <linearGradient id="lc-infinity" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#0891B2" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="lc-glow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#0891B2" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#059669" stop-opacity="0.4" />
    </linearGradient>
  </defs>

  <!-- Glow -->
  <path
    d="M 55 20 C 18 20, 18 80, 55 80 C 82 80, 90 50, 100 50 C 110 50, 118 20, 145 20 C 182 20, 182 80, 145 80 C 118 80, 110 50, 100 50 C 90 50, 82 20, 55 20 Z"
    stroke="url(#lc-glow)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"
    style="filter: blur(4px);"
  />

  <!-- Infinity Path -->
  <path
    d="M 55 20 C 18 20, 18 80, 55 80 C 82 80, 90 50, 100 50 C 110 50, 118 20, 145 20 C 182 20, 182 80, 145 80 C 118 80, 110 50, 100 50 C 90 50, 82 20, 55 20 Z"
    stroke="url(#lc-infinity)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"
  />

  <!-- Globe (left loop) -->
  <g opacity="0.7">
    <circle cx="55" cy="50" r="12" stroke="#0891B2" stroke-width="1.5" />
    <ellipse cx="55" cy="50" rx="5" ry="12" stroke="#0891B2" stroke-width="1.2" />
    <line x1="43" y1="50" x2="67" y2="50" stroke="#0891B2" stroke-width="1.2" />
  </g>

  <!-- Code cross (right loop) -->
  <g opacity="0.8">
    <path d="M 138 50 L 152 50 M 145 43 L 145 57" stroke="#059669" stroke-width="3.5" stroke-linecap="round" />
  </g>
</svg>
