<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:oklch(70% 0.18 158);stop-opacity:1" />
      <stop offset="100%" style="stop-color:oklch(55% 0.15 171);stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Medical Cross with Glass Effect -->
  <g transform="translate(100, 100)">
    <!-- Outer glow -->
    <rect x="-35" y="-70" width="70" height="140" rx="12" fill="url(#logo-gradient)" opacity="0.2" filter="blur(8px)"/>
    <rect x="-70" y="-35" width="140" height="70" rx="12" fill="url(#logo-gradient)" opacity="0.2" filter="blur(8px)"/>
    
    <!-- Main cross -->
    <rect x="-30" y="-65" width="60" height="130" rx="10" fill="url(#logo-gradient)" opacity="0.9"/>
    <rect x="-65" y="-30" width="130" height="60" rx="10" fill="url(#logo-gradient)" opacity="0.9"/>
    
    <!-- Glass highlight -->
    <rect x="-25" y="-60" width="50" height="60" rx="8" fill="white" opacity="0.15"/>
    <rect x="-60" y="-25" width="60" height="50" rx="8" fill="white" opacity="0.15"/>
    
    <!-- Center circle -->
    <circle cx="0" cy="0" r="18" fill="oklch(15% 0.05 168)" opacity="0.8"/>
    <circle cx="0" cy="0" r="12" fill="white" opacity="0.25"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="175" font-family="Satoshi, sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="url(#logo-gradient)">LaventeCare</text>
</svg>
